name: Publish @thebutler/pipeline to npm

on:
  push:
    tags:
      - 'pipeline-v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      # pnpm publish does not reliably expand ${NODE_AUTH_TOKEN} in the
      # .npmrc that setup-node writes — write the literal token instead
      # so pnpm reads valid auth and we get 401/403 (not 404) on misconfig.
      - name: Configure npm auth for pnpm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify auth and scope access
        run: |
          echo "Authenticated as: $(npm whoami)"
          echo "Org membership:"
          npm org ls thebutler || (echo "::error::user is not a member of @thebutler org" >&2; exit 1)

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @thebutler/pipeline...

      # On a pipeline-v* tag, fail fast if the tag doesn't match package.json version.
      # Skipped for manual workflow_dispatch runs (no tag context).
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/pipeline-v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#pipeline-v}"
          PKG_VERSION="$(node -p "require('./packages/pipeline/package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) != package.json version ($PKG_VERSION)" >&2
            exit 1
          fi

      - name: Build
        run: pnpm --filter @thebutler/pipeline build

      - name: Verify build output
        run: |
          if [ ! -f packages/pipeline/dist/index.js ] || [ ! -f packages/pipeline/dist/index.d.ts ]; then
            echo "::error::Build did not produce packages/pipeline/dist/index.{js,d.ts} — refusing to publish." >&2
            ls -la packages/pipeline/dist/ 2>&1 || true
            exit 1
          fi

      - name: Verify tarball will include dist/
        working-directory: packages/pipeline
        run: |
          if ! npm pack --dry-run 2>&1 | grep -q "dist/index.js"; then
            echo "::error::npm pack --dry-run does not include dist/index.js — refusing to publish." >&2
            npm pack --dry-run 2>&1
            exit 1
          fi

      - name: Typecheck
        run: pnpm --filter @thebutler/pipeline typecheck

      - name: Test
        run: pnpm --filter @thebutler/pipeline test

      - name: Publish to npm
        run: pnpm --filter @thebutler/pipeline publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
